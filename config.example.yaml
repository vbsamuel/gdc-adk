app:
  name: gdc-adk
  environment: development
  log_level: INFO

ai_providers:
  google:
    model: "gemini-2.5-flash"

  ollama:
    enabled: false
    base_url: "http://localhost:11434"
    model: "llama3.1:8b"

  llamacpp:
    enabled: false
    endpoint: ""
    model: "qwen2.5-coder:7b"

routing:
  default_provider: "google"
  failover_order:
    - google
    - ollama
    - llamacpp

runtime:
  local_execution:
    max_concurrent_models: 1
    unload_after_request: true
    ollama_keep_alive: 0
    prefer_warm_model: true
    allow_backend_switch: true

agents:
  - name: echo
    type: echo
    config:
      provider: google
      prompt_prefix: "Echo or summarize this input:"
