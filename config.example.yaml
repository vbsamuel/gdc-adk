app:
  name: gdc-labs
  environment: development
  log_level: INFO

ai_providers:
  google:
    model: "gemini-2.5-flash"

  ollama:
    enabled: true
    model: "gemma3:12b-it-qat"
    base_url: "http://localhost:11434"

  llamacpp:
    enabled: false
    model: "qwen3.5:9b"
    base_url: "http://localhost:8000"

routing:
  default_provider: "ollama"
  failover_order:
    - ollama
    - google

runtime:
  local_execution:
    max_concurrent_models: 1
    unload_after_request: true
    ollama_keep_alive: 0
    prefer_warm_model: true
    allow_backend_switch: true

weather:
  provider: "open_meteo"
  open_meteo:
    base_url: "https://api.open-meteo.com/v1/forecast"
